worker_processes auto;

events {
    worker_connections  2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  60;

    #gzip  on;

    server {
        listen       80;
        server_name  localhost;

        # 设置客户端最大请求体大小
        client_max_body_size 50M;

        # 设置超时时间
        client_body_timeout 60s;
        client_header_timeout 60s;

        root         D:/work;
        index        index.php;
        charset      utf-8;
        autoindex on;
        autoindex_exact_size on;
        autoindex_localtime on;

        # 默认 location
        location / {
            try_files $uri $uri/ =404;
        }

        # PeachtreesCMS
        location /pt_api/ {
            alias D:/work/PeachtreesCMS/api/;
            try_files $uri $uri/ =404;
        }
        location /upload/ {
            alias D:/work/PeachtreesCMS/upload/;
        }
        location ~ ^/pt_api/(.+\.php)$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME D:/work/PeachtreesCMS/api/$1;
            fastcgi_param SCRIPT_NAME /pt_api/$1;
            fastcgi_param PHP_VALUE "default_charset=UTF-8\nmbstring.http_output=pass\noutput_handler=\nzlib.output_compression=0";
        }
        # 兼容旧的 /PeachtreesCMS/api 路径（避免代理未重启导致 PHP 源码直出）
        location /PeachtreesCMS/api/ {
            alias D:/work/PeachtreesCMS/api/;
            try_files $uri $uri/ =404;
        }
        location ~ ^/PeachtreesCMS/api/(.+\.php)$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME D:/work/PeachtreesCMS/api/$1;
            fastcgi_param SCRIPT_NAME /PeachtreesCMS/api/$1;
            fastcgi_param PHP_VALUE "default_charset=UTF-8\nmbstring.http_output=pass\noutput_handler=\nzlib.output_compression=0";
        }

        # thepaper-posters
        location /thepaper_api/ {
            alias D:/work/projects-bak/thepaper-posters/api_v2/;
            try_files $uri $uri/ =404;
        }
        location /upload_posters/ {
            alias D:/work/thepaper-posters/upload_posters/;
        }
        location ~ ^/thepaper_api/.+\.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }

}
